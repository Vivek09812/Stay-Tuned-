<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#000000,#111827,#1e3a8a);
      overflow:hidden;
      color:white;
      text-align:center;
    }

    .container{
      padding:40px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(10px);
      border-radius:20px;
      width:90%;
      max-width:500px;
      animation:fade 1.5s ease;
      box-shadow:0 0 30px rgba(0,0,0,0.5);
    }

    h1{
      font-size:55px;
      margin-bottom:15px;
      color:#60a5fa;
    }

    p{
      font-size:18px;
      color:#d1d5db;
      margin-bottom:30px;
    }

    .loader{
      width:70px;
      height:70px;
      border:6px solid rgba(255,255,255,0.2);
      border-top:6px solid #60a5fa;
      border-radius:50%;
      margin:auto;
      animation:spin 1s linear infinite;
    }

    .footer{
      margin-top:30px;
      font-size:14px;
      color:#9ca3af;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Coming Soon</h1>
    <p>Website is under construction.<br>Something awesome is coming soon 🚀</p>

    <div class="loader"></div>

    <div class="footer">
      © 2026 Vivek Prajapati
    </div>
  </div>

</body>
</html>
